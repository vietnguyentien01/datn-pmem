<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <mat-icon>business</mat-icon>
            <h1>Đất Việt</h1>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
            <mat-icon>dashboard</mat-icon>
            <span>Tổng quan</span>
        </a>

        <div class="nav-section">Nhân sự</div>
        <a routerLink="/employees" routerLinkActive="active" class="nav-item">
            <mat-icon>people</mat-icon>
            <span>Hồ sơ nhân viên</span>
        </a>

        <div class="nav-section">Chấm công & Nghỉ phép</div>
        <a routerLink="/attendance/history" routerLinkActive="active" class="nav-item">
            <mat-icon>calendar_today</mat-icon>
            <span>Quản lý chấm công</span>
        </a>
        <a routerLink="/attendance/checkin" routerLinkActive="active" class="nav-item">
            <mat-icon>fingerprint</mat-icon>
            <span>Check-in / Out</span>
        </a>

        <a routerLink="/leave/request" routerLinkActive="active" class="nav-item">
            <mat-icon>event_note</mat-icon>
            <span>Xin nghỉ phép</span>
        </a>
        <a routerLink="/leave/approval" *ngIf="isManager" routerLinkActive="active" class="nav-item">
            <mat-icon>fact_check</mat-icon>
            <span>Duyệt nghỉ phép</span>
        </a>

        <div class="nav-section">Tài chính</div>
        <a routerLink="/payroll" routerLinkActive="active" class="nav-item">
            <mat-icon>payments</mat-icon>
            <span>Bảng lương</span>
        </a>
    </nav>
</div>
