<header class="header">
    <div class="header-left">
        <!-- Optional: Add toggle button for sidebar -->
        <h2 class="page-title">Dashboard</h2>
    </div>
    <div class="header-right">
        <!-- Notification Bell -->
        <button mat-icon-button class="notification-btn" [matMenuTriggerFor]="notifMenu" (menuOpened)="markAllAsRead()">
            <mat-icon [matBadge]="unreadCount" matBadgeColor="warn"
                [matBadgeHidden]="unreadCount === 0">notifications</mat-icon>
        </button>
        <mat-menu #notifMenu="matMenu" class="notification-menu">
            <div class="notif-header">
                <h3>Thông báo</h3>
            </div>
            <mat-divider></mat-divider>
            <div class="notif-list">
                <div class="notif-item" *ngFor="let n of notifications" [ngClass]="{'unread': !n.isRead}"
                    (click)="markAsRead(n)">
                    <div class="notif-icon"><mat-icon color="primary">info</mat-icon></div>
                    <div class="notif-content">
                        <h4>{{n.title}}</h4>
                        <p>{{n.message}}</p>
                        <span class="time">{{n.createdAt | date:'dd/MM HH:mm'}}</span>
                    </div>
                </div>
                <div class="empty-notif" *ngIf="notifications.length === 0">
                    Không có thông báo mới
                </div>
            </div>
        </mat-menu>

        <div class="user-profile">
            <div class="avatar">
                {{ userInitial }}
            </div>
            <div class="user-info">
                <span class="user-name">{{ userName }}</span>
                <span class="user-role">{{ userRole }}</span>
            </div>
            <button mat-icon-button [matMenuTriggerFor]="userMenu">
                <mat-icon>expand_more</mat-icon>
            </button>
            <mat-menu #userMenu="matMenu">
                <button mat-menu-item routerLink="/employees/me">
                    <mat-icon>person</mat-icon>
                    <span>Hồ sơ của tôi</span>
                </button>
                <button mat-menu-item (click)="logout()">
                    <mat-icon>exit_to_app</mat-icon>
                    <span>Đăng xuất</span>
                </button>
            </mat-menu>
        </div>
    </div>
</header>
