<h2 mat-dialog-title>Đề xuất đổi lương</h2>
<mat-dialog-content>
    <p>Nhân viên: <strong>{{ data.employeeName }}</strong></p>
    <p>Lương cố định hiện tại: <strong>{{ (data.currentSalary || 0) | number:'1.0-0' }} đ</strong></p>

    <form [formGroup]="form" class="dialog-form">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Mức lương đề xuất mới</mat-label>
            <input matInput type="number" formControlName="newSalary" required>
            <span matTextSuffix>đ</span>
            <mat-error *ngIf="form.get('newSalary')?.hasError('required')">
                Vui lòng nhập mức lương mới
            </mat-error>
            <mat-error *ngIf="form.get('newSalary')?.hasError('min')">
                Mức lương phải lớn hơn 0
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Lý do đề xuất</mat-label>
            <textarea matInput formControlName="reason" rows="3" required
                placeholder="Lý do tăng/giảm lương..."></textarea>
            <mat-error *ngIf="form.get('reason')?.hasError('required')">
                Vui lòng nhập lý do
            </mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()" [disabled]="isLoading">Hủy</button>
    <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || isLoading">
        <mat-spinner diameter="20" *ngIf="isLoading" style="display:inline-block; margin-right: 8px;"></mat-spinner>
        Gửi phê duyệt
    </button>
</mat-dialog-actions>
