<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <mat-icon color="primary" class="logo-icon">business</mat-icon>
            <h1>PMEM</h1>
            <p>Hệ Thống Quản Lý Nhân Sự</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Email đăng nhập</mat-label>
                <input matInput formControlName="username" type="email" placeholder="Nhập email của bạn" required>
                <mat-icon matPrefix>email</mat-icon>
                <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
                    Email không được để trống
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Mật khẩu</mat-label>
                <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password"
                    placeholder="Nhập mật khẩu" required>
                <mat-icon matPrefix>lock</mat-icon>
                <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                    [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
                    <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                    Mật khẩu không được để trống
                </mat-error>
            </mat-form-field>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button mat-flat-button color="primary" type="submit" class="submit-btn"
                [disabled]="loginForm.invalid || isLoading">
                <span *ngIf="!isLoading">Đăng Nhập</span>
                <mat-spinner diameter="24" *ngIf="isLoading"></mat-spinner>
            </button>
        </form>
    </div>
</div>
