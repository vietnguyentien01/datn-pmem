version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pmem_postgres
    restart: always
    environment:
      POSTGRES_DB: pmem_db
      POSTGRES_USER: pmem
      POSTGRES_PASSWORD: pmem123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - pmem-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pmem_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pmem.vn
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pmem-network

volumes:
  pgdata:

networks:
  pmem-network:
    driver: bridge
